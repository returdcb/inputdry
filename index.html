<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inventory Retur</title>
<style>
body{font-family:Arial;margin:0;background:#f3f3f3}
.page{display:none;padding:20px;max-width:420px;margin:auto}
.active{display:block}
button,input{width:100%;padding:10px;margin:8px 0}
.card{background:#fff;padding:12px;border-radius:8px;margin:10px 0}
</style>
</head>
<body>

<div id="login" class="page active">
<h2>Login</h2>
<input id="user" placeholder="User">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="menu" class="page">
<h2>Menu Utama</h2>
<p id="who"></p>
<button onclick="show('form')">📦 Form Input</button>
<button onclick="loadInventory()">📋 View Inventory</button>
<button onclick="logout()">🚪 Logout</button>
</div>

<div id="form" class="page">
<h2>Form Input</h2>
<button onclick="show('menu')">⬅ Kembali</button>
<form id="f">
<input name="nama_barang" placeholder="Barcode / Nama Barang">
<input name="jumlah" placeholder="Jumlah">
<input name="dus" placeholder="Dus">
<input name="palet" placeholder="Palet">
<button>Kirim</button>
</form>
</div>

<div id="inventory" class="page">
<h2>Inventory</h2>
<button onclick="show('menu')">⬅ Kembali</button>
<input id="search" placeholder="Cari..." onkeyup="filterCard()">
<div id="list"></div>
</div>

<script>
const USERS={retur:'12345',ismail:'12345',agit:'12345',bhintang:'12345',wanda:'12345',septian:'12345',arya:'12345'};
const scriptURL='https://script.google.com/macros/s/AKfycbzfGvvujh5bpBxA4_MLdY_GllIu6pwC0yE5xuMHoVG2Pmp7jQm95-YTdkuPyDgtHO4w-g/exec';
let currentUser='';

function show(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

function login(){
 let u=user.value.trim(),p=pass.value;
 if(USERS[u]===p){
   currentUser=u;
   who.innerText='Login sebagai : '+u;
   show('menu');
 }else alert('Login gagal');
}
function logout(){currentUser='';show('login');}

document.getElementById('f').onsubmit=(e)=>{
 e.preventDefault();
 const fd=new FormData(e.target);
 fd.append('user',currentUser);
 fd.append('tanggal_masuk',new Date().toLocaleString('id-ID'));
 fetch(scriptURL,{method:'POST',body:fd})
 .then(()=>{alert('Data tersimpan');e.target.reset();})
 .catch(()=>alert('Gagal mengirim'));
};

function loadInventory(){
 show('inventory');
 fetch(scriptURL+'?action=inventory')
 .then(r=>r.json())
 .then(data=>{
   list.innerHTML='';
   data.forEach(x=>{
     list.innerHTML+=`<div class="card">
     <b>${x.nama_barang}</b><br>
     Qty : ${x.jumlah}<br>
     Dus : ${x.dus}<br>
     Palet : ${x.palet}<br>
     User : ${x.user}
     </div>`;
   });
 });
}
function filterCard(){
 let k=search.value.toLowerCase();
 document.querySelectorAll('.card').forEach(c=>{
   c.style.display=c.innerText.toLowerCase().includes(k)?'block':'none';
 });
}
</script>
</body>
</html>
